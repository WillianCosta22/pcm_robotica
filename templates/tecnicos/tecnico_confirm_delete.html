{% extends 'base.html' %}
{% block title %}Excluir Técnico{% endblock %}
{% block page_title %}Excluir Técnico{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white"><i class="bi bi-exclamation-triangle me-2"></i>Confirmar Exclusão</div>
            <div class="card-body text-center py-4">
                <i class="bi bi-person-x text-danger mb-3" style="font-size:3rem;"></i>
                <h5>Excluir técnico <strong>{{ object.nome }}</strong>?</h5>
                <p class="text-muted small">Esta ação não pode ser desfeita.</p>
                <div class="d-flex gap-2 justify-content-center mt-3">
                    <form method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger"><i class="bi bi-trash me-1"></i>Sim, Excluir</button>
                    </form>
                    <a href="{% url 'tecnicos:list' %}" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
