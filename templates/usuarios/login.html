<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | RobotSAP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body {
            background: linear-gradient(135deg, #0f1623 0%, #1a2744 50%, #0d1e3a 100%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .login-card {
            background: rgba(255,255,255,0.05); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; padding: 40px; width: 100%; max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        .logo-box {
            width: 60px; height: 60px;
            background: linear-gradient(135deg, #0d6efd, #00d4ff);
            border-radius: 16px; display: flex;
            align-items: center; justify-content: center;
            font-size: 1.8rem; color: #fff; margin: 0 auto 20px;
        }
        h2 { color: #fff; font-weight: 700; }
        .subtitle { color: rgba(255,255,255,0.5); font-size: 0.85rem; }
        label { color: rgba(255,255,255,0.7); font-size: 0.85rem; font-weight: 500; }
        .form-control {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: #fff; border-radius: 10px; padding: 12px 15px;
        }
        .form-control:focus {
            background: rgba(255,255,255,0.12);
            border-color: #0d6efd; color: #fff;
            box-shadow: 0 0 0 3px rgba(13,110,253,0.25);
        }
        .form-control::placeholder { color: rgba(255,255,255,0.3); }
        .btn-login {
            background: linear-gradient(135deg, #0d6efd, #0099ff);
            border: none; border-radius: 10px;
            padding: 12px; font-weight: 600;
            width: 100%; color: #fff; font-size: 0.95rem;
            transition: all 0.2s; margin-top: 10px;
        }
        .btn-login:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(13,110,253,0.4); }
        .errorlist { color: #ff6b6b; font-size: 0.8rem; list-style: none; padding: 0; }
        .divider { border-color: rgba(255,255,255,0.1); }
        .badge-info { background: rgba(0,212,255,0.15); color: #00d4ff; border-radius: 20px; padding: 4px 12px; font-size: 0.75rem; }
    </style>
</head>
<body>
<div class="login-card text-center">
    <div class="logo-box">
        <i class="bi bi-robot"></i>
    </div>
    <h2>RobotSAP</h2>
    <p class="subtitle mb-4">Sistema de Gestão de Ativos Robóticos</p>

    <form method="post">
        {% csrf_token %}
        <div class="mb-3 text-start">
            <label for="id_username">Usuário</label>
            <div class="input-group mt-1">
                <span class="input-group-text" style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.15);color:#aaa;">
                    <i class="bi bi-person"></i>
                </span>
                <input type="text" name="username" id="id_username"
                       class="form-control" placeholder="Digite seu usuário" autofocus required>
            </div>
        </div>
        <div class="mb-3 text-start">
            <label for="id_password">Senha</label>
            <div class="input-group mt-1">
                <span class="input-group-text" style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.15);color:#aaa;">
                    <i class="bi bi-lock"></i>
                </span>
                <input type="password" name="password" id="id_password"
                       class="form-control" placeholder="Digite sua senha" required>
            </div>
        </div>

        {% if form.errors %}
        <div class="alert alert-danger py-2 text-start" style="font-size:0.85rem;">
            <i class="bi bi-exclamation-triangle me-1"></i>
            Usuário ou senha inválidos. Tente novamente.
        </div>
        {% endif %}

        <button type="submit" class="btn btn-login">
            <i class="bi bi-box-arrow-in-right me-2"></i>Entrar no Sistema
        </button>
    </form>

    <hr class="divider my-4">
    <p class="text-muted" style="font-size:0.75rem;">
        <i class="bi bi-shield-lock me-1"></i>
        Acesso restrito a usuários autorizados
    </p>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
