{% extends 'base.html' %}
{% block title %}Concluir OS{% endblock %}
{% block page_title %}Concluir OS{% endblock %}
{% block content %}
<div class="d-flex align-items-center mb-4 gap-3">
    <a href="{% url 'ordens_servico:detail' object.pk %}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i></a>
    <h4 class="mb-0 fw-bold"><i class="bi bi-check2-circle me-2 text-success"></i>Concluir {{ object.numero_os }}</h4>
</div>
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card">
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-medium">Data/Hora de Conclusão</label>
                        {{ form.data_conclusao }}
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-medium">Solução Aplicada *</label>
                        {{ form.solucao }}
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success"><i class="bi bi-check2 me-1"></i>Concluir OS</button>
                        <a href="{% url 'ordens_servico:detail' object.pk %}" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
